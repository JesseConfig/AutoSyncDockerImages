name: Batch Pull Docker Hub Image to GHCR

# 触发方式：手动触发（推荐）、定时触发、代码推送触发
on:
  workflow_dispatch:  # 手动触发
  # 可选：代码推送触发（当imagelist文件修改时自动触发）
  push:
    paths:
      - 'imagelist'
  # 可选：定时触发（每天凌晨）
  schedule:
    - cron: '0 0 1 * *'

jobs:
  batch-migrate-images:
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read  # 新增：需要读取仓库代码（获取imagelist文件）

    steps:
      # 步骤1：拉取仓库代码（核心，获取imagelist文件）
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 步骤2：设置Docker环境
      - name: Set up Docker Environment
        uses: docker/setup-buildx-action@v3

      # 步骤3：登录到GHCR
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GH_TOKEN }}

      # 步骤4：（可选）登录到Docker Hub（拉取私有镜像时需要）
      #- name: Login to Docker Hub
      #  uses: docker/login-action@v3
      #  with:
      #    registry: docker.io
      #    username: ${{ secrets.DOCKER_HUB_USER }}
      #    password: ${{ secrets.DOCKER_HUB_TOKEN }}

      # 步骤5：批量处理imagelist中的镜像（核心逻辑）
      - name: Batch Pull & Push Images
        run: |
          # 定义函数：处理单个镜像（拉取、打标签、推送）
          process_image() {
            local source_image=$1
            # 跳过空行和注释行
            if [[ -z "$source_image" || "$source_image" =~ ^# ]]; then
              return
            fi

            echo "====================================="
            echo "开始处理镜像：$source_image"
            
            # 提取镜像名和标签（处理两种格式：nginx:latest / mysql:8.4）
            # 分割镜像地址为「镜像名」和「标签」，默认标签为latest
            if [[ "$source_image" == *":"* ]]; then
              # 有标签的情况：截取冒号前的部分为镜像名，冒号后为标签
              image_name=$(echo "$source_image" | cut -d':' -f1)
              image_tag=$(echo "$source_image" | cut -d':' -f2)
            else
              # 无标签的情况：默认标签为latest
              image_name=$source_image
              image_tag="latest"
            fi

            # 进一步处理镜像名（去掉Docker Hub用户名前缀，比如jesseconfig/custom-app → custom-app）
            # 只保留最后一个/后的部分，适配GHCR命名简洁性
            image_name_simple=$(echo "$image_name" | awk -F '/' '{print $NF}')

            # 步骤1：拉取源镜像
            echo "1. 拉取镜像：$source_image"
            if ! docker pull "$source_image"; then
              echo "拉取镜像 $source_image 失败，跳过"
              return
            fi

            # 步骤2：重新打标签（GHCR格式：ghcr.io/jesseconfig/镜像名:标签）
            target_image="ghcr.io/jesseconfig/$image_name_simple:$image_tag"
            echo "2. 打标签：$target_image"
            docker tag "$source_image" "$target_image"

            # 步骤3：推送至GHCR
            echo "3. 推送镜像：$target_image"
            if ! docker push "$target_image"; then
              echo "推送镜像 $target_image 失败，跳过"
              return
            fi

            # 步骤4：清理本地镜像（可选）
            echo "4. 清理本地镜像：$source_image 和 $target_image"
            docker rmi "$source_image" "$target_image" || true

            echo "镜像 $source_image 处理完成！"
            echo "====================================="
          }

          # 读取imagelist文件，逐行处理
          echo "开始读取imagelist文件..."
          while IFS= read -r line; do
            # 去除行首尾空格
            line_trimmed=$(echo "$line" | xargs)
            # 调用函数处理每行
            process_image "$line_trimmed"
          done < "imagelist"

      # 步骤6：最终提示
      - name: Finish
        run: |
          echo "所有镜像处理完成！可前往 https://github.com/jesseconfig?tab=packages 查看推送结果"
